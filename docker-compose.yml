services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:////app/subtitool.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    depends_on:
      - backend

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,id
    profiles:
      - libre  # jalankan: docker-compose --profile libre up
